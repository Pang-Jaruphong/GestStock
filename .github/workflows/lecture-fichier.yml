name: Lecture de Fichier
on: 
  push:
    branches: [ "develop" ]   

jobs:
  verification:
    runs-on: ubuntu-latest
    steps:
      # Étape 1 : Le robot "clône" votre projet (indispensable !)
      - name: Récupération du code
        uses: actions/checkout@v4 

      # Étape 2 : On vérifie que les fichiers sont bien là
      - name: Afficher le contenu du dossier
        run: ls -la 

      # Étape 3 : On lit le fichier (La partie que vous deviez compléter)
      - name: Lire le message 
        run: cat message.txt
